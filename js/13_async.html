<!doctype html>
<html lang="ja">
	<head>
		<meta charset="utf-8" />
		<title>非同期処理</title>
	</head>
	<body>
		<!-- ボタンを使用した非同期処理の例 -->
		<button>ボタン</button>
		<script>
			function sleep(ms) {
				setTimeout(() => {
					alert(`sleep関数が完了しました。${ms}ミリ秒経過しました。`);
				}, ms);
			}
			sleep(3000);

			const btn = document.querySelector('button');
			btn.addEventListener('click', () => {
				alert('ボタンがクリックされました。');
			});

			/**
			 * 非同期処理の検証
			 */
			function asyncFunc() {
				console.log('---非同期処理の検証---');
				let val = 0;
				setTimeout(() => {
					val = 1;
				}, 1000);
				console.log(val);
			}
			asyncFunc();

			/**
			 * イベントループ
			 */
			function eventLoopFunc() {
				console.log('---イベントループ---');
				let val = 0;
				setTimeout(() => {
					val = 1;
				}, 0);
				console.log(val);
			}
			eventLoopFunc();

			/**
			 * 非同期処理のハンドリング
			 */
			function asyncHandlingFunc() {
				console.log('---非同期処理のハンドリング---');
				let val = -1;
				setTimeout(() => {
					val = Math.floor(Math.random() * 11);
				}, 1000);
				console.log(val);
			}
			asyncHandlingFunc();

			/**
			 * 非同期処理のハンドリング（コールバック関数）
			 */

			let num = -1;
			function asyncHandlingWithCallback(callback) {
				console.log('---非同期処理のハンドリング（コールバック関数）---');
				setTimeout(() => {
					num = Math.floor(Math.random() * 11);
					callback(num);
				}, 3000);
			}

			function operations(val) {
				console.log(val);
			}

			asyncHandlingWithCallback(operations);
		</script>
	</body>
</html>
