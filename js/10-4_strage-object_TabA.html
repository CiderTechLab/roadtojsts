<!doctype html>
<html lang="ja">
	<head>
		<title>10-4_strage-object</title>
	</head>
	<body>
		<p class="local-strage"></p>
		<p class="session-strage"></p>
		<script>
			/**
			 * ローカルストレージ
			 * - ブラウザに保存されるストレージ
			 */
			localStorage.setItem('fruit', 'Apple');
			document.querySelector('.local-strage').textContent =
				localStorage.getItem('fruit');

			/**
			 * セッションストレージ
			 * - タブ（セッション）ごとに保存されるストレージ
			 * - 同じキーでも、タブ（セッション）が違えば別の値を持てる
			 *   - 10-4_strage-object_TabA.html、10-4_strage-object_TabB.html
			 * 		 を開いて確認してみよう
			 * - ここのセッションは「ブラウザセッション」かつタブごとのセッション。
			 *   - 「サーバーセッション」と違うので注意
			 */
			sessionStorage.setItem('color', 'Red');
			document.querySelector('.session-strage').textContent =
				sessionStorage.getItem('color');
		</script>
	</body>
</html>
